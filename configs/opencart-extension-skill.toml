## 14. Settings Page Pattern (index())

Settings pages **never redirect** after save. They always redisplay the form with `$data['success']` set inline. Never use `$this->session->data['success']`.

Use local `$action` and `$cancel` variables to avoid repeating the URL — reuse them in breadcrumbs and in `$data`.

In the `self::FIELDS` loop, extract the config key into `$key` to avoid repetition.

```php
public function index(): void
{
    $this->load->language(self::ROUTE);

    $this->document->setTitle($this->language->get('heading_title'));

    $data = [];

    if ($this->request->server['REQUEST_METHOD'] === 'POST' && $this->validate()) {
        $this->load->model('setting/setting');

        $this->model_setting_setting->editSetting(self::CODE, $this->request->post);

        $data['success'] = $this->language->get('text_success');
    }

    $data['errors'] = [];

    foreach (self::ERRORS as $error) {
        $data['errors'][$error] = $this->error[$error] ?? '';
    }

    $data['breadcrumbs'] = [
        [
            'text' => $this->language->get('text_home'),
            'href' => $this->url->link('common/dashboard', ['user_token' => $this->session->data['user_token']], true),
        ],
        [
            'text' => $this->language->get('text_extension'),
            'href' => $cancel = $this->url->link('marketplace/extension', ['user_token' => $this->session->data['user_token'], 'type' => 'module'], true),
        ],
        [
            'text' => $this->language->get('heading_title'),
            'href' => $action = $this->url->link(self::ROUTE, ['user_token' => $this->session->data['user_token']], true),
        ],
    ];

    $data['action'] = $action;
    $data['cancel'] = $cancel;

    foreach (self::FIELDS as $field) {
        $key = self::CODE . '_' . $field;
        $data[$field] = $this->request->post[$key] ?? $this->config->get($key);
    }

    $data['header']      = $this->load->controller('common/header');
    $data['column_left'] = $this->load->controller('common/column_left');
    $data['footer']      = $this->load->controller('common/footer');

    $this->response->setOutput($this->load->view(self::ROUTE, $data));
}
```
