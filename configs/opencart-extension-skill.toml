## 12. ocmod XML

**install.xml** (metadata only — no modification operations):

```xml
<?xml version="1.0" encoding="UTF-8"?>
<modification>
    <name>BOX NOW</name>
    <code>shipping_box_now</code>
    <version>1.0</version>
    <author>Dionysis Pasenidis</author>
    <link>https://github.com/pasenidis</link>
</modification>
```

`<code>` matches `self::CODE` exactly.

**Actual modification XML** (when patching core or third-party files):

```xml
<?xml version="1.0" encoding="utf-8"?>
<modification>
    <name>Extension Name</name>
    <code>type_name</code>
    <version>1.0</version>
    <author>Dionysis Pasenidis</author>
    <link>https://github.com/pasenidis</link>

    <!-- Single file -->
    <file path="admin/controller/sale/order.php">
        <operation error="log">
            <search><![CDATA[
$data['breadcrumbs'][] = array(
]]></search>
            <add position="before"><![CDATA[
// injected code here
]]></add>
        </operation>
    </file>

    <!-- Glob — multiple files at once -->
    <file path="catalog/controller/product/{category,manufacturer,product}.php">
        <operation error="skip">
            <search><![CDATA[existing code]]></search>
            <add position="after"><![CDATA[injected code]]></add>
        </operation>
    </file>

    <!-- Wildcard theme path -->
    <file path="catalog/view/theme/*/template/account/order_list.twig">
        <operation error="log" index="1">
            <search trim="true"><![CDATA[search text]]></search>
            <add position="replace"><![CDATA[replacement text]]></add>
        </operation>
    </file>
</modification>
```

**Attribute reference:**

| Attribute | Values | Meaning |
|---|---|---|
| `error` on `<operation>` | `log` / `skip` | Log failure or silently skip if search not found |
| `position` on `<add>` | `before` / `after` / `replace` | Where to inject relative to `<search>` match |
| `index` on `<operation>` | `0`, `1`, `2`… | Target the nth occurrence when search matches multiple times |
| `trim` on `<search>` or `<add>` | `true` | Strip leading/trailing whitespace before matching |

All code content goes inside `<![CDATA[...]]>` sections. 4-space indentation for the XML structure; content inside CDATA preserves original file indentation.

---

## 13. Code Style

```php
<?php
// ↑ blank line immediately after opening tag

/**
 * Extension Name
 * @author Dionysis Pasenidis
 * @link https://github.com/pasenidis
 * @version 1.0
 * ...
 */
```

- **Indentation:** 4 spaces for PHP, 2 spaces for Twig and JS.
- **Line length:** max 120 chars for PHP, 360 for Twig.
- **Arrays:** short syntax `[]` always; key-value pairs aligned when in a block.
- **Alignment:** ONLY array key-value pairs are aligned. Never align `@property` tags, variable assignments, or anything else.
- **Constants:** `private const`, UPPER_SNAKE_CASE, `self::` for references.
- **Closures:** use `static function` when `$this` is not needed.
- **Null coalescing:** prefer `??` and `??=` over isset checks.
- **No `goto`.**
- **Blank line** before `return` is optional but consistent within a file.
- **UTF-8, LF** line endings everywhere.

**Spacing / grouping conventions:**

Consecutive `$this->load->language()`, `$this->load->model()`, and `$this->document->` calls are each grouped together. Add a blank line after each group when the next statement is a different kind:

```php
// ✅ language group, then blank line
$this->load->language(self::ROUTE);

$this->document->setTitle($this->language->get('heading_title'));

$this->load->model('setting/setting');

$data = [];

// ✅ multiple model loads stay together, blank line after the group
$this->load->model('setting/setting');
$this->load->model('localisation/language');

$languages = $this->model_localisation_language->getLanguages();

// ✅ load->model, then blank line before using the model
$this->load->model('user/user_group');

$this->model_user_user_group->addPermission($this->user->getGroupId(), 'access', self::ROUTE);
$this->model_user_user_group->addPermission($this->user->getGroupId(), 'modify', self::ROUTE);
```

```php
// ✅ Key-value alignment in arrays only
private const EVENTS = [
    'admin/view/common/column_left/before' => self::ROUTE . '/viewCommonColumnLeftBefore',
    'admin/view/sale/order_info/after'     => self::ROUTE . '/viewSaleOrderInfoAfter',
];

// ✅ Static closure
$titles = array_map(static function (array $language): string {
    return $language['name'];
}, $languages);

// ✅ Null coalescing with type cast — no variable alignment
$page = max((int)($this->request->get['page'] ?? 1), 1);
$order_id = (int)($this->request->post['order_id'] ?? $this->request->get['order_id'] ?? 0);
```

