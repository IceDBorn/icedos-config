[[icedos.applications.me3.profiles]]
name = "nr-storm-control"
dependencies = ["nr"]
config = """
[[natives]]
load_early = true
path = "/mnt/games-ssd/games/nr/natives/storm-control.dll"
"""

[[icedos.applications.me3.profiles]]
name = "nr-bots"
dependencies = ["nr", "nr-storm-control"]
config = """
[[packages]]
id = "bots"
path = "/mnt/games-ssd/games/nr/packages/bots"
"""

[[icedos.applications.me3.profiles]]
name = "nr-variations"
dependencies = ["nr", "nr-storm-control"]
config = """
[[packages]]
id = "variations"
path = "/mnt/games-ssd/games/nr/packages/variations/output"
"""

[icedos.applications.network-manager]
applet = true

[icedos.applications.power-profiles-daemon]
profile = "performance"

[icedos.applications.protonvpn-cli]
country = "BG"

[icedos.applications.scx]
scheduler = "bpfland"

[icedos.applications.sd-inhibitor.users.ice.watchers.pipewire]
inputsToIgnore = ["Noise Canceling source", "Peak detect", "cava"]
outputsToIgnore = ["Discord", "Element"]

[icedos.applications.sd-inhibitor.users.ice.watchers.ports]
inboundPorts = [22, 47989]

[icedos.applications.steam]
beta = true
cpuUsageWorkaround = true
downloadsWorkaround = true

[icedos.applications.wolf]
stateFolder = "/mnt/virtualisation/wolf"
extraPackages = []
extraVolumes = [
  "/home/ice/.local/share/Steam/compatibilitytools.d:/home/retro/.steam/steam/compatibilitytools.d",
  "/home/ice/.local/share/Steam/steamapps:/home/retro/.steam/steam/steamapps",
  "/mnt/games-hdd/steam:/home/retro/games-hdd",
  "/mnt/games-ssd/steam:/home/retro/games-ssd",
  "/mnt/virtualisation/steam:/home/retro/virtualisation",
]

[icedos.applications.zed]
vim = true

[icedos.applications.zed.lsp.taplo.settings.formatter]
alignComments = false
reorderKeys = false

[icedos.desktop]
autologinUser = "ice"

[icedos.desktop.cosmic]
disableExcludedPackagesWarning = true
excludeDefaultPackages = [
  "cosmic-applibrary",
  "cosmic-files",
  "cosmic-initial-setup",
  "cosmic-launcher",
]

[icedos.desktop.cosmic.panel.plugins]
right = [
  "com.system76.CosmicAppletStatusArea",
  "com.system76.CosmicAppletInputSources",
  "net.tropicbliss.CosmicExtAppletCaffeine",
  "com.system76.CosmicAppletBluetooth",
  "com.system76.CosmicAppletAudio",
  "com.system76.CosmicAppletBattery",
  "com.system76.CosmicAppletNetwork",
  "com.system76.CosmicAppletNotifications",
  "com.system76.CosmicAppletTime",
  "com.system76.CosmicAppletPower",
]

[icedos.desktop.cosmic.patches.cosmic-applets]
steamGameIconMatcher = true

[icedos.desktop.cosmic.patches.cosmic-comp]
disableMonitorsOnLock = true
fixTilingHintClipping = true
fixWakeFromSleep = true
perWindowKeyboardLayout = true

[icedos.desktop.cosmic.patches.cosmic-osd]
keyboardLayoutOsd = true

[icedos.desktop.cosmic.patches.cosmic-notifications]
windowMatchingRoundness = true

[icedos.desktop.cosmic.patches.xdg-desktop-portal-cosmic]
useGtkFilePicker = true

[icedos.desktop.cosmic.input.mouse]
mouseSpeed = 65

[[icedos.desktop.cosmic.input.keyboard.shortcuts]]
action = "Close"
keys = ["Super+semicolon"]

[[icedos.desktop.cosmic.input.keyboard.shortcuts]]
action = "Maximize"
keys = ["Super+Greek_mu"]

[[icedos.desktop.cosmic.input.keyboard.shortcuts]]
action = "ToggleWindowFloating"
keys = ["Super+g", "Super+Greek_gamma"]

[[icedos.desktop.cosmic.input.keyboard.shortcuts]]
action = "WorkspaceOverview"
keys = ["Super+Greek_finalsmallsigma"]
variant = "System"

[[icedos.desktop.cosmic.input.keyboard.shortcuts]]
command = "cosmic-screenshot"
description = "Screenshot"
keys = ["Super+p", "Super+Greek_pi"]
variant = "Spawn"

[[icedos.desktop.cosmic.input.keyboard.shortcuts]]
command = "walker-applications"
description = "Application launcher"
keys = ["Super+r", "Super+Greek_rho"]
variant = "Spawn"

[[icedos.desktop.cosmic.input.keyboard.shortcuts]]
command = "walker-clipboard"
description = "Clipboard manager"
keys = ["Super+v", "Super+Greek_omega"]
variant = "Spawn"

[[icedos.desktop.cosmic.input.keyboard.shortcuts]]
command = "walker-emojis"
description = "Emoji picker"
keys = ["Super+e", "Super+Greek_epsilon"]
variant = "Spawn"

[[icedos.desktop.cosmic.input.keyboard.shortcuts]]
command = "killall -9 .cosmic-panel-wrapped .walker-wrapped"
description = "Soft Reset"
keys = ["Ctrl+Alt+Delete"]
variant = "Spawn"

[icedos.desktop.cosmic.sound]
showMediaControlsInPanel = true

[icedos.desktop.cosmic.wallpaper]
wallpaper = "path:/home/ice/Pictures/wallpaper.jpg"

[icedos.desktop.cosmic.windowManagement.focus]
cursorFollowsFocus = true
followsCursor = true

[icedos.desktop.cosmic.windowManagement.controls]
activeHint = true
maximize = false
minimize = false

[icedos.desktop.cosmic.workspaces]
tile = true

[icedos.desktop.cosmic.users.ice]

[icedos.desktop.users.ice]
startupScript = """
  sleep 1 &&
  signal-desktop &
"""

[icedos.hardware]
swapDevices = ["/swap/swapfile"]

[icedos.hardware.bootloaders.systemd-boot]
mountPoint = "/boot"

[icedos.hardware.graphics.radeon]
featureMask = "0xffffffff"

[icedos.hardware.kernel]
variant = "latest-lto-x86_64-v3"

[[icedos.hardware.mounts]]
path = "/"
device = "/dev/mapper/luks-f71c56ea-2db0-47d2-b57c-21b8f7ea1b22"
fsType = "btrfs"
flags = ["compress=zstd", "nofail", "x-gvfs-show"]

[[icedos.hardware.mounts]]
path = "/home"
device = "/dev/mapper/luks-f71c56ea-2db0-47d2-b57c-21b8f7ea1b22"
fsType = "btrfs"
flags = ["compress=zstd", "nofail"]

[[icedos.hardware.mounts]]
path = "/mnt/games-hdd"
device = "games-hdd"
fsType = "zfs"
flags = ["nofail", "x-gvfs-show"]

[[icedos.hardware.mounts]]
path = "/mnt/games-ssd"
device = "games-ssd"
fsType = "zfs"
flags = ["nofail", "x-gvfs-show"]

[[icedos.hardware.mounts]]
path = "/mnt/virtualisation"
device = "virtualisation"
fsType = "zfs"
flags = ["nofail", "x-gvfs-show"]

[[icedos.hardware.monitors]]
name = "DP-1"
resolution = "3440x1440"
refreshRate = 144
position = "0x0"

[[icedos.hardware.monitors]]
name = "DP-2"
resolution = "1920x1080"
refreshRate = 144
position = "3440x200"

[icedos.hardware.network]
firewall = false

[icedos.hardware.network.wakeOnLan]
interfaces = ["enp9s0"]

[icedos.hardware.openrgb]
profile = "6900xt"

[icedos.tweaks.cachyos]
useAdios = true
useCachyosZramProfile = true

[icedos.users.ice]
description = "IceDBorn"

[icedos.system]
version = "25.11"

