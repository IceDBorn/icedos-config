[[packages]]
id = "fast-torrent"
path = "/mnt/games-ssd/games/er/packages/fast-torrent"

[[packages]]
id = "nightreign-movement-speed"
path = "/mnt/games-ssd/games/er/packages/nightreign-movement-speed"
"""

[[icedos.applications.me3.profiles]]
name = "er-convergence"
dependencies = ["er"]
config = """
[[natives]]
path = "/mnt/games-ssd/games/er/natives/convergence/CMI.dll"

[[natives]]
path = "/mnt/games-ssd/games/er/natives/convergence/eldenring_alt_saves.dll"

[[natives]]
path = "/mnt/games-ssd/games/er/natives/convergence/ErdTools.dll"

[[natives]]
path = "/mnt/games-ssd/games/er/natives/convergence/erdyes.dll"

[[natives]]
path = "/mnt/games-ssd/games/er/natives/convergence/ertransmogrify.dll"

[[natives]]
path = "/mnt/games-ssd/games/er/natives/convergence/Scripts-Data-Exposer-FS.dll"

[[packages]]
id = "convergence"
path = "/mnt/games-ssd/games/er/packages/convergence"
"""

[[icedos.applications.me3.profiles]]
name = "nr"
config = """
profileVersion = "v1"
disable_arxan = true
start_online = true

[[supports]]
game = "nr"

[[natives]]
path = "/mnt/games-ssd/games/nr/natives/cl_server_redirector.dll"

[[natives]]
path = "/mnt/games-ssd/games/nr/natives/disable-sharpening.dll"

[[natives]]
path = "/mnt/games-ssd/games/nr/natives/disable-chromatic-aberration.dll"

[[natives]]
path = "/mnt/games-ssd/games/nr/natives/disable-vignette.dll"

[[natives]]
path = "/mnt/games-ssd/games/nr/natives/increase-animation-distance.dll"

[[natives]]
path = "/mnt/games-ssd/games/nr/natives/unlock-fps.dll"

[[natives]]
path = "/mnt/games-ssd/games/nr/natives/ultrawide.dll"

[[packages]]
id = "blue-filter-removal"
