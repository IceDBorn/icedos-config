modules = [
  "btop",
  "celluloid",
  "eden",
  "gamescope",
  "harmony-music",
  "helium",
  "input-remapper",
  "lact",
  "lsfg-vk",
  "mangohud",
  "me3",
  "nautilus",
  "ncdu",
  "network-manager",
  "obs",
  "power-profiles-daemon",
