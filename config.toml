[[icedos.repositories]]
url = "github:icedos/apps"
# overrideUrl = "path:/home/ice/.code/icedos/apps"
fetchOptionalDependencies = true
modules = [
  "btop",
  "celluloid",
  "eden",
  "gamescope",
  "harmony-music",
  "helium",
  "input-remapper",
  "lact",
  "lsfg-vk",
  "mangohud",
  "me3",
  "nautilus",
  "ncdu",
  "network-manager",
  "obs",
  "power-profiles-daemon",
  "prefixer",
  "proton-launch",
  "protonvpn-cli",
  "reigntweak",
  "scx",
  "sd-inhibitor",
  "steam",
  "sunshine",
  "tailscale",
  "wolf",
  "zed",
  "zenergy",
]

[[icedos.repositories]]
url = "github:icedos/cosmic"
# overrideUrl = "path:/home/ice/.code/icedos/cosmic"
fetchOptionalDependencies = true

[[icedos.repositories]]
url = "github:icedos/hardware"
# overrideUrl = "path:/home/ice/.code/icedos/hardware"
modules = [
  "bluetooth",
  "cachyos-kernel",
  "disable-ipv6",
  "kernel",
  "monitors",
  "openrgb",
  "pipewire",
  "radeon",
  "ryzen",
  "systemd-boot",
  "uinput",
  "upower",
  "wake-on-lan",
  "xpadneo",
  "zfs",
]

[[icedos.repositories]]
url = "github:icedos/tweaks"
# overrideUrl = "path:/home/ice/.code/icedos/tweaks"
modules = [
  "cachyos",
  "gaming",
  "kernel",
]

[icedos.applications]
defaultBrowser = "helium.desktop"
defaultEditor = "dev.zed.Zed.desktop"
extraPackages = [
  "appimage-run",
  "faugus-launcher",
  "fragments",
  "gimp3",
  "moonlight-qt",
  "rpcs3",
  "signal-desktop",
  "steamtinkerlaunch",
  "warp",
]
insecurePackages = []

[icedos.applications.docker.daemonSettings]
data-root = "/mnt/virtualisation/docker"

[icedos.applications.git.users.ice]
username = "IceDBorn"
email = "git.outsider841@simplelogin.fr"

[[icedos.applications.helium.profiles]]
exec = "helium-discord"
name = "Discord"
sites = [
  "https://discord.com/app",
]

[[icedos.applications.helium.profiles]]
exec = "helium-element"
name = "Element"
sites = [
  "https://develop.element.io",
]

[[icedos.applications.helium.profiles]]
exec = "helium-proton"
name = "Proton"
sites = [
  "https://drive.proton.me",
  "https://lumo.proton.me",
  "https://mail.proton.me",
  "https://pass.proton.me",
]

[[icedos.applications.helium.profiles]]
exec = "helium-sharkord"
name = "Sharkord"
sites = [
  "https://sharkord.knp.one",
]

[icedos.applications.mangohud]
fpsLimit = "0,144,60,30"

[icedos.applications.kitty]
hideDecorations = true

[[icedos.applications.me3.profiles]]
name = "er"
config = """
profileVersion = "v1"
disable_arxan = true
start_online = true

[[supports]]
game = "er"

[[natives]]
path = "/mnt/games-ssd/games/er/natives/disable-sharpening.dll"

[[natives]]
path = "/mnt/games-ssd/games/er/natives/increase-animation-distance.dll"

[[natives]]
path = "/mnt/games-ssd/games/er/natives/remove-chromatic-aberration.dll"

[[natives]]
path = "/mnt/games-ssd/games/er/natives/remove-vignette.dll"

[[natives]]
path = "/mnt/games-ssd/games/er/natives/ultrawide.dll"

[[natives]]
path = "/mnt/games-ssd/games/er/natives/unlock-fps.dll"

[[natives]]
path = "/mnt/games-ssd/games/er/natives/seamless-coop/ersc.dll"
"""

[[icedos.applications.me3.profiles]]
name = "er-nr"
dependencies = ["er"]
config = """
[[natives]]
path = "/mnt/games-ssd/games/er/natives/er-practice-tool.dll"

[[natives]]
